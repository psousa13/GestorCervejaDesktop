# ── Base de Dados ──────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/Neo-Cerveja
spring.datasource.username=postgres
spring.datasource.password=psql
spring.datasource.driver-class-name=org.postgresql.Driver

# ── HikariCP (connection pool) ─────────────────────────────────────────────────
spring.datasource.hikari.pool-name=GestorCervejaPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# ── Spring Boot ────────────────────────────────────────────────────────────────
# Desativa o servidor web embarcado (aplicação desktop, não web)
spring.main.web-application-type=none

# Evita o banner do Spring Boot no arranque
spring.main.banner-mode=off

# ── Logging ────────────────────────────────────────────────────────────────────
logging.level.root=WARN
logging.level.com.gestorcerveja=INFO
logging.level.org.springframework.jdbc=DEBUG
